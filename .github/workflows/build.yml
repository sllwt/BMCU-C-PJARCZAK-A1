name: 自动编译固件

# 触发条件：当您推送代码到任何分支时自动运行
on: [push, pull_request]

jobs:
  build:                    # 注意这里需要缩进2空格
    name: 编译所有固件
    runs-on: ubuntu-latest

    steps:
      # 1. 下载你的代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 设置Python环境
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装PlatformIO
      - name: 安装PlatformIO
        run: pip install platformio

      # 4. 执行编译脚本
      - name: 执行编译脚本
        run: |
          chmod +x build_all_firmwares.sh
          ./build_all_firmwares.sh

      # 5. 上传编译好的固件文件
      - name: uplaodfirmwares
        uses: actions/upload-artifact@v4
        with:
          name: firmwares-${{ github.sha }}  # 修正变量语法
          path: firmwares/
          if-no-files-found: error
          retention-days: 30
